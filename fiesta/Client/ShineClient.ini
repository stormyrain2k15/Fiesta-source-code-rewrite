; ============================================================================
; ShineClient.ini
; Shine client configuration.
; All paths can be absolute or relative to the exe directory.
; ============================================================================

; ----------------------------------------------------------------------------
; [Server] -- network endpoints
; ----------------------------------------------------------------------------
[Server]
LoginIP=127.0.0.1
LoginPort=9010

; WorldManager -- blank = skip WM, connect direct to Zone (Phase 1)
WMIP=127.0.0.1
WMPort=28000

; Zone direct (Phase 1 bypass only)
ZoneIP=127.0.0.1
ZonePort=9020

; ----------------------------------------------------------------------------
; [Account]
; ----------------------------------------------------------------------------
[Account]
User=admin
Pass=admin
CharId=1

; ----------------------------------------------------------------------------
; [Window]
; ----------------------------------------------------------------------------
[Window]
Width=1280
Height=720
Fullscreen=0
Title=Shine
Renderer=DX9
VSync=1

; ----------------------------------------------------------------------------
; [Paths]
; All paths relative to exe directory or absolute.
;
; Sub-path conventions (matching original Fiesta layout for Phase 1):
;   ResMap    -> resmap\<MapFolder>\*    e.g. resmap\RouN\terrain.nif
;   ResChar   -> reschar\<CharType>\*   e.g. reschar\HumanMale\body.nif
;   ResItem   -> resitem\<ItemInx>\*    e.g. resitem\HammerA01\item.nif
;   ResMenu   -> resmenu\game\*         e.g. resmenu\game\MainBar.dds
;   ResEffect -> reseffect\<Name>\*
;   ResCtrl   -> resctrl\<Name>\*
;   ResSound  -> ressound\<Category>\*
;   ResSystem -> ressystem\*
;   ShaderDir -> shader\*
;   SkinDir   -> Skin\*
;   MilesDir  -> miles\*
;   DumpDir   -> Dump\*                 crash dump output
;   DataDir   -> Data\Shine\*           *.shine data tables
; ----------------------------------------------------------------------------
[Paths]
BaseDir=.
ResMap=.\resmap
ResChar=.\reschar
ResItem=.\resitem
ResCtrl=.\resctrl
ResEffect=.\reseffect
ResMenu=.\resmenu
ResSound=.\ressound
ResSystem=.\ressystem
ShaderDir=.\shader
SkinDir=.\Skin
MilesDir=.\miles
DumpDir=.\Dump
DataDir=.\Data\Shine
ResAction=.\ressystem\action

; ----------------------------------------------------------------------------
; [MapPaths]
; MapId -> folder name under ResMap.
; Fiesta used names like RouN, DeadF, Elim that don't match map IDs.
; Any MapId not listed falls back to the numeric MapId as the folder name.
; ----------------------------------------------------------------------------
[MapPaths]
1=RouN
2=Mine
3=GorgonT
4=DeadF
5=Elim
6=TempleF
7=FireB
8=SnowF

; ----------------------------------------------------------------------------
; [Audio]
; ----------------------------------------------------------------------------
[Audio]
MasterVolume=80
BGMVolume=70
SFXVolume=85
EnableAudio=1

; ----------------------------------------------------------------------------
; [Camera]
; ----------------------------------------------------------------------------
[Camera]
DefaultDist=600
DefaultPitch=-45
MinDist=100
MaxDist=3000
OrbitSensitivity=0.4

; ----------------------------------------------------------------------------
; [Debug]
; ----------------------------------------------------------------------------
[Debug]
; 0=ERROR 1=WARN 2=INFO 3=DEBUG
LogLevel=2
LogFile=ShineClient.log

; SkipLogin=1 connects direct to ZoneIP:ZonePort (Phase 1 testing)
SkipLogin=0

ShowCollision=0
ShowBounds=0
LogPackets=0
