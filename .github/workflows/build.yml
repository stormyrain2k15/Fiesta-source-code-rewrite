name: build

# CI compile pass for the entire Fiesta solution.
#
# *** Toolset note ***
# The actual local target is VS2010 (v100). v100 was last shipped on the
# `windows-2016` runner image which Microsoft retired. This workflow uses
# `windows-2022` + v141 (VS2019 build tools, still preinstalled on the
# 2022 image) as the closest publicly available toolset.
# (`windows-2019` was also retired by GitHub mid-2025; do not put it
# back -- the job will sit queued forever waiting for a runner that
# no longer exists.)
# v141 will catch ~95% of issues v100 would (syntax, linker,
# missing headers, ODR collisions, undefined references). It will NOT
# catch:
#   * VS2010-only stricter conformance rejections (rare; v141 is more
#     permissive on a few tail cases)
#   * v100-specific MSVCRT inlining differences
#   * MSCRT2010-specific link errors (e.g. msvcr100.dll dependencies)
#
# A green CI here means "the code is structurally sound enough that a
# v100 build is likely to succeed". The authoritative build is still
# the local VS2010 build.
#
# Repo layout assumption: this workflow lives at /.github/workflows/
# and the C++ tree is rooted at /fiesta/. All paths below are relative
# to the repository root.

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

defaults:
  run:
    working-directory: src/fiesta

jobs:
  windows-build:
    name: Windows / v141 (Win32, ${{ matrix.config }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - name: Checkout
        # Check out into a fixed subdir with a clean name. Required
        # because the repo name ends in '.' and Windows strips trailing
        # dots from directory names, breaking the default $GITHUB_WORKSPACE
        # path. Do NOT remove the `path:` line unless the repo is renamed.
        uses: actions/checkout@v4
        with:
          path: src

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Stub out third-party SDKs
        # The SDKs (Gamebryo, Lua 5.2, MSSQL Native Client) are not
        # redistributable on a public CI image. We drop minimal header
        # stubs so the cpp/h tree compiles enough to surface ODR /
        # symbol-resolution / syntax errors. Linking is allowed to fail;
        # the strict static-lib pass below does the real verification.
        shell: cmd
        working-directory: src/fiesta
        run: |
          mkdir ThirdParty\Lua\include 2>nul
          mkdir ThirdParty\Lua\lib 2>nul
          call Build\CI\stub_lua_headers.bat
          call Build\CI\stub_gamebryo_headers.bat
          call Build\CI\stub_sqlncli_headers.bat

      - name: MSBuild solution (compile only -- skip link errors)
        shell: cmd
        working-directory: src/fiesta
        run: |
          msbuild Build\Fiesta.sln ^
            /m /v:minimal ^
            /p:Configuration=${{ matrix.config }} ^
            /p:Platform=Win32 ^
            /p:PlatformToolset=v141 ^
            /p:LinkIncremental=false ^
            /p:TreatLinkWarningAsError=false ^
            /flp:LogFile=msbuild-${{ matrix.config }}.log;Verbosity=normal ^
            /flp1:LogFile=msbuild-${{ matrix.config }}.errors.log;ErrorsOnly ^
            /flp2:LogFile=msbuild-${{ matrix.config }}.warnings.log;WarningsOnly
        continue-on-error: true

      - name: Compile-only pass (Cl.exe, no link)
        # If the full link failed (expected without real SDKs), do an
        # explicit /c pass on the static-lib projects so the CI signal
        # is "compile errors broke the tree" not "missing third-party
        # libs broke the tree".
        shell: cmd
        working-directory: src/fiesta
        run: |
          msbuild Build\Common.vcxproj         /m /v:minimal /p:Configuration=${{ matrix.config }} /p:Platform=Win32 /p:PlatformToolset=v141
          msbuild Build\Shared.vcxproj         /m /v:minimal /p:Configuration=${{ matrix.config }} /p:Platform=Win32 /p:PlatformToolset=v141
          msbuild Build\DataReader.vcxproj     /m /v:minimal /p:Configuration=${{ matrix.config }} /p:Platform=Win32 /p:PlatformToolset=v141
          msbuild Build\DataServerCommon.vcxproj /m /v:minimal /p:Configuration=${{ matrix.config }} /p:Platform=Win32 /p:PlatformToolset=v141
        continue-on-error: false

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs-${{ matrix.config }}
          path: |
            src/fiesta/msbuild-${{ matrix.config }}.log
            src/fiesta/msbuild-${{ matrix.config }}.errors.log
            src/fiesta/msbuild-${{ matrix.config }}.warnings.log
          retention-days: 14
