name: canary

# Daily canaries:
# 1. Source-tree health -- code grep for forbidden patterns (modern C++,
#    AI markers, broken comment syntax). Catches drift from the VS2010 +
#    "no AI tags" project rules without needing a real build.
# 2. SHN data integrity -- runs a Python parser against every committed
#    .shn fixture to catch corrupted binary headers. (Real .shn files
#    aren't redistributable; this only runs against any test fixtures
#    that ship in-tree.)
# 3. PRD / docs link check -- catches broken inter-doc references after
#    file moves.
#
# Runs daily at 09:00 UTC and on every push to main. Manual dispatch
# also enabled so you can fire it ad-hoc after a refactor.
#
# Repo layout assumption: this workflow lives at /.github/workflows/
# and the C++ tree is rooted at /fiesta/. All paths below are relative
# to the repository root.

on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: fiesta

jobs:
  source-health:
    name: Source health canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbidden modern-C++ syntax (VS2010 v100 only)
        # VS2010 has no auto/nullptr/range-for/lambda support in the
        # codebase's chosen subset. If any of these slip in, the local
        # v100 build will fail. Catch them on PR before the user has to
        # run the local compile.
        run: |
          set -e
          fail=0
          out=$(grep -rIniE '\bnullptr\b|\bauto\s+[a-zA-Z_]' \
            --include='*.cpp' --include='*.h' \
            Server/ Client/ Lua/ 2>/dev/null \
            | grep -v 'auto_ptr\|automatic\|automation\|auto-' || true)
          if [ -n "$out" ]; then
            echo "::error::Forbidden modern-C++ usage detected (must compile under VS2010 v100):"
            echo "$out"
            fail=1
          fi
          # Range-for: `for (T x : container)`. Discriminate from the
          # legitimate `for (T::iterator it = ...; ...; ...)` by checking
          # that there is NO semicolon and NO `::` between the opening
          # paren and the colon.
          out=$(grep -rIn -E 'for[[:space:]]*\([^;:)]+ : [^;)]+\)' \
            --include='*.cpp' --include='*.h' \
            Server/ Client/ Lua/ 2>/dev/null || true)
          if [ -n "$out" ]; then
            echo "::error::Range-based for loop (C++11) detected:"
            echo "$out"
            fail=1
          fi
          out=$(grep -rIn -E '\benum class\b|\bconstexpr\b|\bdecltype\b|\bstatic_assert\b' \
            --include='*.cpp' --include='*.h' \
            Server/ Client/ Lua/ 2>/dev/null || true)
          if [ -n "$out" ]; then
            echo "::error::C++11 keyword detected:"
            echo "$out"
            fail=1
          fi
          exit $fail

      - name: AI / generation markers
        # User has explicitly forbidden any AI-platform fingerprints.
        # Catch regressions before they reach review.
        # Two passes: human-text patterns are case-insensitive, the
        # comment-tag patterns (MOCKED/EVIDENCE/GENERATED/AI) are
        # case-sensitive so a comment that says "// generated header"
        # in a normal sentence doesn't trip the canary.
        run: |
          set -e
          fail=0
          out=$(grep -rIniE 'elle[ _-]?ann?|chatgpt|openai api|claude api|anthropic|gpt[ -]?[1-9]|copilot|llm[_ -]?(generated|wrote)|written by ai|automatically generated by' \
            --include='*.cpp' --include='*.h' --include='*.md' --include='*.txt' \
            . 2>/dev/null \
            | grep -v 'ThirdParty/' \
            | grep -v 'docs/HONEST_DISCLOSURE.md' \
            || true)
          if [ -n "$out" ]; then
            echo "::error::AI / platform fingerprint detected:"
            echo "$out"
            fail=1
          fi
          # Case-sensitive check for the literal AI-tag comment shapes.
          out=$(grep -rInE '//[[:space:]]*(MOCKED|EVIDENCE|GENERATED|AI[ -])' \
            --include='*.cpp' --include='*.h' \
            Server/ Client/ Lua/ 2>/dev/null \
            | grep -v 'docs/HONEST_DISCLOSURE.md' \
            || true)
          if [ -n "$out" ]; then
            echo "::error::AI / generation comment tag detected:"
            echo "$out"
            fail=1
          fi
          exit $fail

      - name: Stray-syntax comment-rot detector
        # Catches the specific defect class fixed earlier this fork:
        # comment lines that start with `:` or `--` instead of `//`.
        # Tightened to exclude:
        #   * C++ constructor initializer lists (legitimately start with
        #     `:` and contain `(`)
        #   * Ternary continuations (legitimately start with `:` and end
        #     with `;`)
        # The remaining matches are lines that look like English prose
        # introduced by `:` or `--` -- almost certainly a typo for `//`.
        run: |
          set -e
          out=$(grep -rIn -E '^[[:space:]]*: [A-Za-z][^();]*$|^[[:space:]]*-- [A-Za-z][^();]*$' \
            --include='*.cpp' --include='*.h' \
            Server/ Client/ Lua/ 2>/dev/null \
            | grep -v 'docs/HONEST_DISCLOSURE.md' \
            || true)
          if [ -n "$out" ]; then
            echo "::error::Stray comment leader (likely '//' typoed as ':' or '--'):"
            echo "$out"
            exit 1
          fi

      - name: BOM / CRLF mixed line endings
        # VS2010 cl.exe is fussy about UTF-8 BOMs in some headers.
        run: |
          set -e
          # Files with a UTF-8 BOM
          bad=$(find Server Client Lua -type f \( -name '*.cpp' -o -name '*.h' \) \
                -exec grep -l $'\xef\xbb\xbf' {} \; 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "::warning::UTF-8 BOM detected (VS2010 sometimes mishandles these):"
            echo "$bad"
          fi

  shn-integrity:
    name: SHN/DAT fixture integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Walk SHN fixtures
        # Validates the 4-byte magic + record count header on any .shn
        # files committed under docs/spec_pack/fixtures/ or test/fixtures/.
        # Real game data is not redistributable; this only runs against
        # tiny verification fixtures that ship in-tree.
        run: |
          python3 Build/CI/check_shn_fixtures.py

      - name: SHN wiring coverage audit
        # Cross-references the data dictionary's File_Summary.csv against
        # every consumer in /Server. Fails if a server-side SHN is loaded
        # by the registry but no binder reads it (regression: feature
        # gap or stale dictionary). Client-only View/ tables are
        # whitelisted via the audit's CLIENT_ONLY_VIEWS set.
        run: |
          python3 Build/CI/audit_shn_wiring.py

      - name: Unwired data-load audit
        # Catches the LevelGapTable bug class: a class declared
        # `Load(rRoot)` or `Bind()` but never called from any boot
        # file. The function is dead code but the table is parsed,
        # so callers silently fall back to neutral defaults.
        run: |
          python3 Build/CI/audit_unwired_loads.py

  doc-links:
    name: Doc cross-link canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve every relative link in docs/*.md
        run: |
          python3 Build/CI/check_doc_links.py
